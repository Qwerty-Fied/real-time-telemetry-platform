global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "telemetry-consumer"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["telemetry-consumer:8080"]

  - job_name: "mqtt-producer"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["mqtt-producer:8080"]
      
  - job_name: "kafka-exporter"
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: "dlq-reprocessor"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["dlq-reprocessor:8080"]      